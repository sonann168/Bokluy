worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  access_log /var/log/nginx/access.log combined;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript
             application/xml+rss application/atom+xml image/svg+xml;

  # Security headers (supplement Helmet on the Node side)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # Upstream services
  upstream api_server {
    server localhost:8080;
    keepalive 32;
  }

  upstream donation_hub {
    server localhost:5173;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    # ── Socket.IO (WebSocket upgrade) ──────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://api_server;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400s;
    }

    # ── API routes ─────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;

      proxy_pass         http://api_server;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # No caching for API responses
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Auth routes – stricter limiter ─────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;

      proxy_pass         http://api_server;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      add_header Cache-Control "no-store" always;
    }

    # ── Static assets – long cache ─────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|ico|gif)$ {
      proxy_pass http://donation_hub;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend SPA (catch-all) ───────────────────────────────────────────────
    location / {
      proxy_pass         http://donation_hub;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      # SPA fallback – never cache HTML
      add_header Cache-Control "no-store, no-cache" always;
    }
  }
}
